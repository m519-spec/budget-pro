<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget-Buddy Pro</title>
    <link rel="stylesheet" href="egenProjekt.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="header-top">
                <h1>Budget <span>Pro</span></h1>
                <button id="settings-btn" class="icon-btn" title="Inställningar">⚙️</button>
            </div>
            <p class="subtitle">Hela familjen</p>
        </header>
        
        <div class="summary-cards">
            <div class="card income-card">
                <div class="card-icon">↓</div>
                <div class="card-info">
                    <span class="card-label">Inkomster</span>
                    <h2 id="total-inkomst">0 kr</h2>
                </div>
            </div>
            <div class="card expense-card">
                <div class="card-icon">↑</div>
                <div class="card-info">
                    <span class="card-label">Utgifter</span>
                    <h2 id="total-utgift">0 kr</h2>
                </div>
            </div>
            <div class="card balance-card">
                <div class="card-icon">💰</div>
                <div class="card-info">
                    <span class="card-label">Total Balans</span>
                    <h2 id="balans">0 kr</h2>
                    <p id="balans-usd" style="font-size: 0.9rem; color: var(--text-muted); margin-top: 2px; font-weight: 600;"></p>
                </div>
            </div>
            <div class="card electricity-card">
                <div class="card-icon">⚡</div>
                <div class="card-info">
                    <span class="card-label">Elpris (Live)</span>
                    <h2 id="elpris">Hämtar...</h2>
                </div>
            </div>
            <div class="card water-card">
                <div id="vatten-ikon" class="card-icon">💧</div>
                <div class="card-info">
                    <span class="card-label">Vattenstatus</span>
                    <h2 id="vatten-status">Hämtar...</h2>
                </div>
            </div>
        </div>

        <div id="kommentar-fält" class="humor-ruta"></div>

        <main class="main-content">
            <section class="add-transaction">
                <h3>Ny Händelse</h3>
                <form id="transaktions-formulär">
                    <div class="input-group">
                        <label for="titel">Beskrivning</label>
                        <input type="text" id="titel" placeholder="t.ex. Pizza, Lön, Hyra" required>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="belopp">Belopp (kr)</label>
                            <input type="number" id="belopp" placeholder="0" min="0" required>
                        </div>
                        <div class="input-group">
                            <label for="typ">Typ</label>
                            <select id="typ">
                                <option value="inkomst">Inkomst</option>
                                <option value="utgift">Utgift</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="medlem">Vem?</label>
                        <select id="medlem">
                            <option value="Mamma">Mamma</option>
                            <option value="Pappa">Pappa</option>
                            <option value="Barnen">Barnen</option>
                            <option value="Gemensamt">Gemensamt</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Lägg till händelse</button>
                </form>
            </section>

            <section class="history">
                <h3>Historik</h3>
                <ul id="transaktions-lista">
                    <!-- Transaktioner hamnar här -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Inställningar</h2>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-group">
                    <label>Tema</label>
                    <select id="theme-select">
                        <option value="default">Standard (Lila/Blå)</option>
                        <option value="dark">Mörkt Läge</option>
                        <option value="light">Ljust Läge</option>
                        <option value="orange">Light Orange</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label>Familjemedlemmar</label>
                    <input type="text" id="family-members-input" placeholder="Mamma, Pappa, Barnen">
                    <small>Dessa visas i "Vem?"-listan när du lägger till en händelse.</small>
                </div>
                <div class="settings-group">
                    <button id="reset-data-btn" class="btn-danger">Nollställ all data</button>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="btn-primary">Spara ändringar</button>
            </div>
        </div>
    </div>

    <script src="egenProjekt.js"></script>
</body>
</html>
